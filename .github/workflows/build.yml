name: Build & Publish OpenSSL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          local-cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Get version
        id: version
        run: |
          chmod +x gradlew
          ./gradlew -q exportProjectInfo -PndkPath=$ANDROID_NDK_HOME
          VERSION=$(cat build/ndkports-matrix.json | jq -r '.include[] | select(.name=="openssl") | .version')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "OpenSSL version: ${VERSION}"

      - name: Build and publish
        run: |
          # Single Gradle invocation:
          # - distZip: builds OpenSSL + publishes to local repo + creates zip
          # - publishMavenPublicationToGitHubPackagesRepository: publishes to GitHub Packages
          # Gradle deduplicates shared task dependencies, so the build runs only once.
          ./gradlew \
            :openssl:distZip \
            :openssl:publishMavenPublicationToGitHubPackagesRepository \
            -PndkPath=$ANDROID_NDK_HOME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/distributions/openssl-*.zip
          tag_name: openssl-${{ steps.version.outputs.version }}
          name: OpenSSL ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
