name: Build & Publish OpenSSL

on:
  push:
    branches: [main, release]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          local-cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build OpenSSL
        run: |
          chmod +x gradlew
          ./gradlew :openssl:prefabPackage \
            -PndkPath=$ANDROID_NDK_HOME \
            -Psigning.skip=true

      - name: Publish to GitHub Packages
        run: |
          ./gradlew :openssl:publish \
            -PndkPath=$ANDROID_NDK_HOME \
            -Psigning.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Build distribution zip
        run: |
          ./gradlew :openssl:distZip \
            -PndkPath=$ANDROID_NDK_HOME \
            -Psigning.skip=true

      - name: Get version
        id: version
        run: |
          VERSION=$(./gradlew -q :openssl:properties -PndkPath=$ANDROID_NDK_HOME 2>/dev/null | grep "^version:" | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/distributions/openssl-*.zip
          tag_name: openssl-${{ steps.version.outputs.version }}
          name: OpenSSL ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
